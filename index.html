<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' 'unsafe-inline' https: data: ; "
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' 'unsafe-inline' https: data: ; "
    />
    <title>URL Loader</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="body">
    <div class="container">
        <h1>Open a URL</h1>
        <form id="url-form">
        <input
            id="url-input"
            type="text"
            placeholder="Enter URL"
            autocomplete="off"
        />
        <button type="submit">Go</button>
        </form>
        <small>If you omit the scheme, https:// will be added automatically.</small>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
